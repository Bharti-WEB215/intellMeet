# IntellMeet Helm Values
# Override these in your environment-specific values files

replicaCount: 2

image:
  repository: intellmeet/app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: intellmeet
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: intellmeet.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: intellmeet-tls
      hosts:
        - intellmeet.example.com

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  NODE_ENV: production
  PORT: "5000"
  JWT_EXPIRES_IN: "7d"

secrets:
  MONGODB_URI: ""
  REDIS_URL: ""
  JWT_SECRET: ""
  CLOUDINARY_CLOUD_NAME: ""
  CLOUDINARY_API_KEY: ""
  CLOUDINARY_API_SECRET: ""
  OPENAI_API_KEY: ""
  SENTRY_DSN: ""

probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
  readiness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3

nodeSelector: {}
tolerations: []
affinity: {}
