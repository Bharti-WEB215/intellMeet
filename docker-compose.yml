# ══════════════════════════════════════════════
# IntellMeet — Docker Compose (Dev + Production)
# ══════════════════════════════════════════════
# Usage: docker-compose up --build

version: '3.9'

services:
  # ─── IntellMeet Application ───
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intellmeet-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/intellmeet
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-intellmeet-production-secret-change-me}
      - JWT_EXPIRES_IN=7d
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - intellmeet-network
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── MongoDB ───
  mongodb:
    image: mongo:7.0-jammy
    container_name: intellmeet-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=intellmeet
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    networks:
      - intellmeet-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: intellmeet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - intellmeet-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Prometheus ───
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: intellmeet-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - intellmeet-network

  # ─── Grafana ───
  grafana:
    image: grafana/grafana:10.4.1
    container_name: intellmeet-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=intellmeet2024
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - intellmeet-network

volumes:
  mongodb-data:
  mongodb-config:
  redis-data:
  uploads-data:
  prometheus-data:
  grafana-data:

networks:
  intellmeet-network:
    driver: bridge
    name: intellmeet-network
